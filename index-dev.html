<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓮ノ空聖書正典 (Dev)</title>
    <style>
        /* GradioのMonochromeテーマとカスタムCSSを再現 */
        body { 
            background: white; 
            color: black; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0b0f14; color: white; }
        }

        .container { 
            max-width: 600px; 
            width: 90%;
            padding-top: 45px; 
        }

        h1 { margin-bottom: -5px; font-size: 32px; font-weight: 900; }
        
        #doctrine { 
            font-size: 1.5em; 
            line-height: 1.4; 
            font-weight: bold; 
            margin-bottom: 20px; 
        }

        /* 審判の箱 */
        #oracle-box { 
            display: none; 
            color: #000; 
            background: #fff; 
            border: 4px solid #000; 
            padding: 25px 10px; 
            line-height: 1.1; 
            min-height: 130px; 
            margin: 20px auto;
        }
        @media (prefers-color-scheme: dark) {
            #oracle-box { color: #fff; background: #000; border: 4px solid #fff; }
        }

        #pair-display { font-size: 52px; font-weight: 900; letter-spacing: 2px; }
        
        #peace-msg { 
            display: none;
            font-size: 20px; 
            font-weight: bold; 
            color: #d63031; 
            margin: 10px auto; 
        }

        /* ボタン共通設定 */
        .action-btn { 
            display: block;
            font-size: 24px; 
            font-weight: bold; 
            width: 320px; 
            max-width: 100%;
            border: 2px solid #000; 
            margin: 10px auto;
            cursor: pointer;
            transition: 0.2s;
        }
        @media (prefers-color-scheme: dark) {
            .action-btn { border: 2px solid #fff; }
        }

        #draw-btn { background: black; color: white; height: 75px; font-size: 28px; }
        #draw-btn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
        
        .share-btn { background: white; color: black; height: 60px; font-size: 20px; display: none; }
        @media (prefers-color-scheme: dark) {
            .share-btn { background: #000; color: #fff; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ 蓮ノ空聖書正典</h1>
        <div id="doctrine">日付が変わるまであなたの思想は<br>統一されます。</div>

        <div id="oracle-box">
            <div style="font-size: 38px; font-weight: normal; margin-bottom: 2px;">本日の神託</div>
            <div id="pair-display"></div>
        </div>

        <div id="peace-msg">これにより、不毛なカップリング論争は終結しました。</div>

        <button id="draw-btn" class="action-btn" onclick="getOracle()">神託を受ける</button>
        
        <button id="share-x" class="action-btn share-btn" onclick="share('x')">Xで信仰を広める</button>
        <button id="share-bsky" class="action-btn share-btn" onclick="share('bsky')">Blueskyで信仰を広める</button>
    </div>

    <script>
        const HF_URL = "https://nyanpre-cp-oracle-dev.hf.space/gradio_api";
        const GITHUB_PAGES_URL = "https:/nyanpre-source.github.io/hasu-cp-oracle/";
        let currentPair = "";

        // 起動時に保存された神託があるかチェック
        window.onload = () => {
            const lastDate = localStorage.getItem('lastOracleDate');
            const today = new Date().toLocaleDateString('ja-JP');
            if (lastDate === today) {
                const savedPair = localStorage.getItem('lastPairName');
                if (savedPair) showResult(savedPair);
            }
        };

        async function getOracle() {
            const today = new Date().toLocaleDateString('ja-JP');
            const lastDate = localStorage.getItem('lastOracleDate');

            // 1日1回のロック
            if (lastDate === today) {
                alert("本日の神託は既に下されています。\n明日の更新まで、今の思想を維持しなさい。");
                return;
            }

            const btn = document.getElementById('draw-btn');
            btn.innerText = "交信中...";
            btn.disabled = true;

            try {
                let deviceId = localStorage.getItem('cp_oracle_device_id') || Math.random().toString(36).substring(2);
                localStorage.setItem('cp_oracle_device_id', deviceId);

                const res = await fetch(`${HF_URL}/call/get_oracle`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: [deviceId] })
                });
                const { event_id } = await res.json();

                const poll = await fetch(`${HF_URL}/call/get_oracle/${event_id}`);
                const text = await poll.text();
                const dataLine = text.split('\n').find(l => l.startsWith('data: '));
                const resultData = JSON.parse(dataLine.substring(6));

                // Gradioから返ってくるHTMLからペア名を抽出
                const match = resultData[0].match(/letter-spacing: 2px;'>([^<]+)</);
                currentPair = match ? match[1] : "運命";

                // 状態を保存
                localStorage.setItem('lastOracleDate', today);
                localStorage.setItem('lastPairName', currentPair);

                showResult(currentPair);
            } catch (e) {
                console.error(e);
                alert("交信に失敗しました。");
                btn.innerText = "再試行";
                btn.disabled = false;
            }
        }

        function showResult(pair) {
            currentPair = pair;
            document.getElementById('pair-display').innerText = pair;
            document.getElementById('oracle-box').style.display = 'block';
            document.getElementById('peace-msg').style.display = 'block';
            document.getElementById('share-x').style.display = 'block';
            document.getElementById('share-bsky').style.display = 'block';
            document.getElementById('draw-btn').style.display = 'none';
            document.getElementById('doctrine').style.display = 'none';
        }

        function share(platform) {
            const shareUrl = GITHUB_PAGES_URL + encodeURIComponent(currentPair) + ".html";
            const text = `私は「${currentPair}」を信仰しています。\n\n蓮ノ空聖書正典：\n${shareUrl}`;
            
            if (platform === 'x') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
            } else {
                window.open(`https://bsky.app/intent/compose?text=${encodeURIComponent(text)}`, '_blank');
            }
        }
    </script>
</body>
</html>
