<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓮ノ空聖書正典 (Dev)</title>
    <style>
        body { background: white; color: black; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .container { max-width: 600px; padding: 20px; }
        #oracle-box { display: none; border: 4px solid black; padding: 30px; margin: 20px 0; }
        .pair-name { font-size: 52px; font-weight: 900; letter-spacing: 2px; }
        .btn { background: black; color: white; border: none; padding: 15px 30px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        .share-area { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ 蓮ノ空聖書正典</h1>
        <button id="draw-btn" class="btn" onclick="getOracle()">神託を受ける</button>

        <div id="oracle-box">
            <div style="font-size: 24px;">本日の神託</div>
            <div id="pair-display" class="pair-name"></div>
            <p>これにより、不毛なカップリング論争は終結しました。</p>
        </div>

        <div id="share-area" class="share-area">
            <button onclick="shareSNS()" style="padding:10px; cursor:pointer;">Xで信仰を広める</button>
        </div>
    </div>

    <script>
        // 構成情報に基づき、/gradio_api を追加
        const HF_URL = "https://nyanpre-cp-oracle-dev.hf.space/gradio_api"; 
        let currentPair = "";

        async function getOracle() {
            const btn = document.getElementById('draw-btn');
            btn.innerText = "交信中...";
            btn.disabled = true;

            try {
                let deviceId = localStorage.getItem('cp_oracle_device_id') || Math.random().toString(36).substring(2);
                localStorage.setItem('cp_oracle_device_id', deviceId);

                // 1. 実行リクエスト (POST /call/get_oracle)
                const res = await fetch(`${HF_URL}/call/get_oracle`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: [deviceId] })
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const { event_id } = await res.json();

                // 2. 結果取得 (GET /call/get_oracle/{event_id})
                const poll = await fetch(`${HF_URL}/call/get_oracle/${event_id}`);
                const text = await poll.text();
                
                // SSE形式のレスポンスからデータを抽出
                const dataLine = text.split('\n').find(l => l.startsWith('data: '));
                if (!dataLine) throw new Error("No data line found");
                
                const resultData = JSON.parse(dataLine.substring(6));

                // HTMLからペア名を抽出
                const match = resultData[0].match(/>([^<]+)</);
                currentPair = match ? match[1] : "運命";

                document.getElementById('pair-display').innerText = currentPair;
                document.getElementById('oracle-box').style.display = 'block';
                document.getElementById('share-area').style.display = 'block';
                btn.style.display = 'none';
            } catch (e) {
                console.error("Critical Error:", e);
                alert("神との交信に失敗しました。Hugging FaceのStatusとPublic設定を確認してください。");
                btn.innerText = "再試行";
                btn.disabled = false;
            }
        }

        function shareSNS() {
            const url = `https://rairaff8-source.github.io/hasu-cp-ogp/${encodeURIComponent(currentPair)}.html`;
            const text = `私は「${currentPair}」を信仰しています。\n\n蓮ノ空聖書正典：\n${url}`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
