<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>蓮ノ空聖書正典</title>

    <meta property="og:title" content="蓮ノ空聖書正典 - 今日の神託">
    <meta property="og:description" content="日付が変わるまであなたの思想は統一されます。">
    <meta property="og:url" content="https://nyanpre.github.io/hasu-cp-oracle/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:image" content="https://huggingface.co/spaces/Nyanpre/cp-oracle/resolve/main/assets/ogp/default.png">

    <script>
        // 2. URLパラメータ(?p=...)からペア名を取得
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('p');
        
        // アプリ本体のURL
        const appUrl = "https://huggingface.co/spaces/Nyanpre/cp-oracle";

        // 3. パラメータがある場合のみ、OGPを動的に上書き（一部のクローラーやブラウザ用）
        if (pair && pair !== 'default') {
            const imgUrl = `https://huggingface.co/spaces/Nyanpre/cp-oracle/resolve/main/assets/ogp/${pair}.png`;
            
            document.write(`<meta property="og:title" content="本日の神託は【${pair}】です">`);
            document.write(`<meta property="og:image" content="${imgUrl}">`);
        }

        // 4. 人間がアクセスした場合はアプリへ自動転送
        // OGPクローラーに読み込む時間を与えるため、ほんの少しだけ遅延させることも可能ですが、基本は即時でOKです
        window.location.href = appUrl;
    </script>

    <noscript>
        <meta http-equiv="refresh" content="0;URL=https://huggingface.co/spaces/Nyanpre/cp-oracle">
    </noscript>
</head>
<body>
    <p>神託を確認中... 画面が切り替わらない場合は<a href="https://huggingface.co/spaces/Nyanpre/cp-oracle">こちら</a>をクリックしてください。</p>
</body>
</html>
