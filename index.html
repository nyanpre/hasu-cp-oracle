<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>蓮ノ空聖書正典</title>

    <meta property="og:title" content="蓮ノ空聖書正典 - 今日の神託">
    <meta property="og:description" content="日付が変わるまであなたの思想は統一されます。">
    <meta property="og:url" content="https://nyanpre.github.io/hasu-cp-oracle/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:image" content="https://huggingface.co/spaces/Nyanpre/cp-oracle/resolve/main/assets/ogp/default.png">
    
<script>
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('p');
        
        // 直通URL（パラメータも引き継ぐ）
        let targetUrl = "https://nyanpre-cp-oracle.hf.space";
        if (pair) {
            targetUrl += "?p=" + encodeURIComponent(pair);
        }

        // 3. OGPの動的書き換え（クローラー用）
        if (pair && pair !== 'default') {
            const imgUrl = `https://huggingface.co/spaces/Nyanpre/cp-oracle/resolve/main/assets/ogp/${pair}.png`;
            document.write(`<meta property="og:title" content="本日の神託は【${pair}】です">`);
            document.write(`<meta property="og:image" content="${imgUrl}">`);
            document.write(`<meta property="og:url" content="${targetUrl}">`);
        }

        // 4. 強制転送（replaceを使用し、履歴に残さないことで戻り現象を防ぐ）
        // さらに top.location を使うことで、もしフレームに入れられそうになっても
        // 最上位のウィンドウを直通URLに書き換えます。
        if (window.top !== window.self) {
            window.top.location.replace(targetUrl);
        } else {
            window.location.replace(targetUrl);
        }
    </script>
    
    <noscript>
        <meta http-equiv="refresh" content="0;URL=https://nyanpre-cp-oracle.hf.space">
    </noscript>
</head>
<body>
    <p>神託を確認中... 画面が切り替わらない場合は<a href="https://nyanpre-cp-oracle.hf.space">こちら</a>をクリックしてください。</p>
</body>
</html>
